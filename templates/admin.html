<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body style="text-align:center;">

<h1>Admin Dashboard</h1>

<a href="/logout">Logout</a>

<h2>Customer Inquiries</h2>

<table border="1" style="margin:auto;">
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Message</th>
    </tr>

    {% for i in inquiries %}
    <tr>
        <td>{{ i.name }}</td>
        <td>{{ i.phone }}</td>
        <td>{{ i.message }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
